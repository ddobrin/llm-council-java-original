server.port=8080

spring.main.web-application-type=servlet
spring.application.name=llmcouncil
spring.config.import=classpath:council.yaml

spring.autoconfigure.exclude=\
  org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration,\
  org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,\
  org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration,\
  org.springframework.ai.model.chat.memory.autoconfigure.ChatMemoryAutoConfiguration,\
  org.springframework.ai.model.embedding.observation.autoconfigure.EmbeddingObservationAutoConfiguration,\
  org.springframework.ai.model.tool.autoconfigure.ToolCallingAutoConfiguration,\
  org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration,\
  org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration

# Storage - use local | cloud, default local
conversation.storage.location=${CONVERSATIONS:local}
# Storage oonversation - local
conversation.dir=data/conversations
# Storage - GCS
bucket.name=llm-council-conversations

# Vaadin/Hilla settings
vaadin.launch-browser=true
# Disable Vite dev server in production JAR (vaadin-dev is optional and excluded from fat JAR)
vaadin.frontend.hotdeploy=false

# WebSocket buffer size - increase for large LLM responses (default 8KB is too small)
# 1MB buffer to accommodate Stage 2 peer ranking responses
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB
# Tomcat thread pool — CouncilEndpoint.createSession() blocks up to 15 s
# and saveCompletedSession() blocks up to 1 min per request.
server.tomcat.threads.max=30
server.tomcat.threads.min-spare=10

# Vaadin/Hilla Push (Atmosphere) configuration
vaadin.push.servlet-mapping=/VAADIN/push
# Configure Atmosphere to use chunked responses for large messages
vaadin.atmosphere.maxWebSocketMessageSize=1048576

#################################
# Logging
#################################
# dev.council — council stage lifecycle, session creation, member responses
#   INFO:  stage start/complete, member response received (with per-model latency and token counts)
#   DEBUG: per-emission detail (each Flux element), prompt template rendering
logging.level.dev.council=INFO
# org.springframework.ai — Spring AI observation logging
#   INFO:  model initialization
#   DEBUG: full prompt text and model completion content (requires log-prompt/log-completion=true below)
#   Set to INFO in production to avoid logging sensitive prompt/completion content
logging.level.org.springframework.ai=INFO
# otel.spans — local span export (only active with "local" profile, see Profiles section below)
#   INFO: completed span summary: [traceId] spanName (durationMs) attributes={...}
logging.level.otel.spans=INFO
# Suppress false-positive WARN from ObservationThreadLocalAccessor when async Netty threads
# lack the ThreadLocal parent observation (Reactor context propagation is correct)
logging.level.io.micrometer.observation.contextpropagation.ObservationThreadLocalAccessor=ERROR
# Suppress verbose Atmosphere (Vaadin Push / WebSocket transport) startup INFO messages
logging.level.org.atmosphere=WARN
# conditional logging patterns
# logging.pattern.correlation=
logging.pattern.correlation=%replace([%correlationId]){'\[\\s+\]', ''}

#################################
# Observability / Tracing
#################################
# Sample 100% of traces (set lower in high-traffic production, e.g. 0.1 for 10%)
management.tracing.sampling.probability=1.0
# Enable automatic Reactor context propagation so observations (spans) placed in
# Reactor context via contextWrite() are restored to ThreadLocal on scheduler hops.
# Required for gen_ai.client.operation spans to appear as children of council.stage.* spans.
spring.reactor.context-propagation=auto
# Expose actuator endpoints for local metric inspection
management.endpoints.web.exposure.include=health,info,metrics
# Disable OTLP metrics export — protobuf version conflict between OTel SDK (4.x)
# and Google Cloud libraries (3.x). Not needed: traces go via TraceExporter,
# metrics are available locally via /actuator/metrics
management.otlp.metrics.export.enabled=false

# Export Micrometer metrics to Google Cloud Monitoring (Stackdriver)
# Uses same ADC and GOOGLE_CLOUD_PROJECT as TraceExporter
management.stackdriver.metrics.export.enabled=true
management.stackdriver.metrics.export.project-id=${GOOGLE_CLOUD_PROJECT}
management.stackdriver.metrics.export.step=1m

# Spring AI observation logging (trace-correlated)
# When true, Spring AI logs full prompt/completion text at DEBUG level under
# org.springframework.ai logger. Each log line includes traceId/spanId in MDC
# for correlation with the gen_ai.client.operation span that produced it.
spring.ai.chat.observations.log-prompt=true
spring.ai.chat.observations.log-completion=true

#################################
# Profiles
#################################
# The "local" profile switches trace export from Google Cloud Trace to console logging.
# Activate with: --spring.profiles.active=local  or  -Dspring.profiles.active=local
#
# Profile behavior:
#   default (no profile)  — Traces: Cloud Trace | Metrics: Cloud Monitoring | Logs: Cloud Logging (direct API)
#   "local"               — Traces: console    | Metrics: /actuator only   | Logs: console only
#
# The "local" profile overrides are in application-local.properties.

#################################
# Viewing Metrics — Local (any profile)
#################################
# Metrics are always available via Spring Boot Actuator, regardless of profile.
#
# List all available metric names:
#   curl -s localhost:8080/actuator/metrics | jq '.names[]' | grep -E 'council|gen_ai'
#
# Custom council metrics (Micrometer timers from Observations):
#   curl -s localhost:8080/actuator/metrics/council.stage1.individual-review | jq
#   curl -s localhost:8080/actuator/metrics/council.stage2.peer-ranking | jq
#   curl -s localhost:8080/actuator/metrics/council.stage3.agreement-analysis | jq
#   curl -s localhost:8080/actuator/metrics/council.stage4.disagreement-analysis | jq
#   curl -s localhost:8080/actuator/metrics/council.stage5.final-synthesis | jq
#   curl -s localhost:8080/actuator/metrics/council.session.create | jq
#   curl -s localhost:8080/actuator/metrics/council.session.save | jq
#
# Spring AI auto-generated metrics:
#   curl -s localhost:8080/actuator/metrics/gen_ai.client.operation | jq
#   curl -s localhost:8080/actuator/metrics/gen_ai.client.token.usage | jq
#
# Filter by tag (e.g., specific stage or model):
#   curl -s 'localhost:8080/actuator/metrics/gen_ai.client.operation?tag=gen_ai.request.model:claude-opus-4-6' | jq

#################################
# Viewing Traces — Local ("local" profile)
#################################
# With --spring.profiles.active=local, completed spans are logged to console:
#   [traceId] council.stage1.individual-review (4523ms) attributes={council.stage=1, council.session.id=abc-123}
#   [traceId] gen_ai.client.operation (2100ms) attributes={gen_ai.request.model=claude-opus-4-6, ...}
#
# Span hierarchy per stage:
#   council.stage1.individual-review         (custom parent span)
#     +-- gen_ai.client.operation             (auto, per ChatModel call, one per council member)
#     +-- gen_ai.client.operation             (auto, per ChatModel call)
#     +-- gen_ai.client.operation             (auto, per ChatModel call)
#
# Each stage is a separate HTTP request, so stages appear as separate traces.
# Use the council.session.id attribute to correlate all stages for one session.

#################################
# Viewing Traces — Google Cloud Trace (default profile)
#################################
# Without the "local" profile, spans are exported to Google Cloud Trace via
# TraceExporter using Application Default Credentials (ADC).
#
# Prerequisites:
#   - GOOGLE_CLOUD_PROJECT env var set
#   - ADC configured (gcloud auth application-default login, or GCE/Cloud Run metadata)
#
# View traces:
#   Cloud Console > Trace > Trace list
#   Filter by attribute: council.session.id:{SESSION_UUID}
#   Click a trace to see the waterfall view (stage > model calls)
#
# View correlated logs:
#   Cloud Console > Logging > Logs Explorer
#   Filter: jsonPayload."logging.googleapis.com/trace"="projects/{PROJECT}/traces/{TRACE_ID}"
#   Or filter by severity, logger, etc.

#################################
# Viewing Metrics — Google Cloud Monitoring (default profile)
#################################
# Metrics are exported to Cloud Monitoring via micrometer-registry-stackdriver every 60s.
# Requires GOOGLE_CLOUD_PROJECT env var and ADC (same as traces).
# Disabled in "local" profile via application-local.properties.
#
# View in Cloud Console > Monitoring > Metrics Explorer:
#   Resource type: custom.googleapis.com/
#   Metric: council.stage1.individual-review (p50/p95/p99 latencies)
#   Token usage: gen_ai.client.token.usage with label gen_ai_token_type=input|output|total

#################################
# Model configurations
#################################
# Gemini
spring.ai.google.genai.flash3.project-id=${GOOGLE_CLOUD_PROJECT}
spring.ai.google.genai.flash3.location=${GOOGLE_CLOUD_LOCATION}
spring.ai.google.genai.flash3.chat.options.model=gemini-3-flash-preview
spring.ai.google.genai.flash3.chat.options.temperature=1

spring.ai.google.genai.flash31lite.project-id=${GOOGLE_CLOUD_PROJECT}
spring.ai.google.genai.flash31lite.location=${GOOGLE_CLOUD_LOCATION}
spring.ai.google.genai.flash31lite.chat.options.model=gemini-3.1-flash-lite-preview
spring.ai.google.genai.flash31lite.chat.options.temperature=1

spring.ai.google.genai.pro31.project-id=${GOOGLE_CLOUD_PROJECT}
spring.ai.google.genai.pro31.location=${GOOGLE_CLOUD_LOCATION}
spring.ai.google.genai.pro31.chat.options.model=gemini-3.1-pro-preview
spring.ai.google.genai.pro31.chat.options.temperature=1

#Anthropic
spring.ai.anthropic.opus46.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.opus46.chat.options.model=claude-opus-4-6
spring.ai.anthropic.opus46.chat.options.max-tokens=8192

spring.ai.anthropic.sonnet46.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.sonnet46.chat.options.model=claude-sonnet-4-6
spring.ai.anthropic.sonnet46.chat.options.max-tokens=8192

spring.ai.anthropic.haiku45.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.haiku45.chat.options.model=claude-haiku-4-5
spring.ai.anthropic.haiku45.chat.options.max-tokens=8192

#################################
# Vertex AI routing for Anthropic Claude models
#################################
# When true, routes Claude models through Vertex AI rawPredict using Google ADC.
# Requires GOOGLE_CLOUD_PROJECT. No ANTHROPIC_API_KEY needed.
vertex.ai.anthropic.enabled=${VERTEX_AI_ANTHROPIC_ENABLED:true}
vertex.ai.anthropic.project-id=${GOOGLE_CLOUD_PROJECT:}
vertex.ai.anthropic.location=${VERTEX_AI_ANTHROPIC_LOCATION:global}

# Additional models - older models
spring.ai.google.genai.flash25.project-id=${GOOGLE_CLOUD_PROJECT}
spring.ai.google.genai.flash25.location=${GOOGLE_CLOUD_LOCATION}
spring.ai.google.genai.flash25.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.flash25.chat.options.temperature=1

spring.ai.google.genai.pro25.project-id=${GOOGLE_CLOUD_PROJECT}
spring.ai.google.genai.pro25.location=${GOOGLE_CLOUD_LOCATION}
spring.ai.google.genai.pro25.chat.options.model=gemini-2.5-pro
spring.ai.google.genai.pro25.chat.options.temperature=1

#################################
# Council API timeouts (ISO-8601 duration format)
#################################
# Override via env var or external config to tune for slow LLMs or local dev.
council.api.timeout=PT5M
council.endpoint.session-timeout=PT15S
council.endpoint.save-timeout=PT1M
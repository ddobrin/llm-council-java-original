# Native image runtime profile
# Activate with: ./llm-council --spring.profiles.active=native
#
# Why this profile exists:
# The micrometer-registry-stackdriver library uses Google Cloud Monitoring client
# internally, which relies heavily on reflection for gRPC, credentials, and
# serialization. These reflective calls fail in GraalVM native images without
# extensive (and fragile) configuration that Google doesn't officially support.
#
# What still works:
# - Traces: Google Cloud Trace export works (TraceExporter has native support)
# - Metrics: Available locally via /actuator/metrics endpoint
# - Logs: Cloud Logging appender (direct API) — may need testing with native images
#
# What's disabled:
# - Metrics export to Cloud Monitoring (Stackdriver)

management.stackdriver.metrics.export.enabled=false

# Defer bean instantiation until first use. Beans protected by the
# LazyInitializationExcludeFilter in CouncilConfig remain eager.
spring.main.lazy-initialization=true

# Disable eager ChatClient warmup in native image.
# ChatClients use lazy double-checked locking (AbstractChatClient.getChatClient()),
# so the first request pays the initialization cost instead of blocking startup.
council.warmup.enabled=false
